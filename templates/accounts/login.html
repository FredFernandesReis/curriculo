{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Parceiro - Currículo PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body style="padding-top:0;background:#f1f5f9">
    <div class="d-flex align-items-center justify-content-center min-vh-100 p-3">
        <div class="card border-0 shadow-sm" style="width:100%;max-width:420px;border-radius:16px">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-badge text-primary" style="font-size:2.5rem"></i>
                    <h4 class="fw-bold mt-2 mb-1">Área do Parceiro</h4>
                    <p class="text-muted small mb-0">Acesse sua conta para gerenciar currículos</p>
                </div>
                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} py-2 small">{{ message }}</div>
                {% endfor %}
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Usuário</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Senha</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>
                <p class="text-center text-muted small mt-4 mb-0">
                    <a href="{% url 'core:home' %}" class="text-muted text-decoration-none">← Voltar ao site</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
