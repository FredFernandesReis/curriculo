{% extends 'dashboard/base_dashboard.html' %}

{% block title %}Excluir Currículo{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm" style="border-radius: 12px;">
            <div class="card-body text-center p-5">
                <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
                <h4 class="fw-bold mt-3">Confirmar Exclusão</h4>
                <p class="text-muted">
                    Tem certeza que deseja excluir o currículo de
                    <strong>{{ curriculo.cliente.nome_completo }}</strong>?
                    Esta ação não pode ser desfeita.
                </p>
                <form method="post" class="d-flex gap-2 justify-content-center">
                    {% csrf_token %}
                    <a href="{% url 'dashboard:visualizar' curriculo.pk %}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-danger">Excluir</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
