# Nginx — Currículo PRO (curriculo.store)
# Copie para: /etc/nginx/sites-available/curriculopro

server {
    listen 80;
    listen [::]:80;
    server_name curriculo.store www.curriculo.store;

    client_max_body_size 20M;

    location /static/ {
        alias /var/www/curriculopro/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/curriculopro/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }
}
